services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      platforms:
        - linux/amd64
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_OWNER_EMAIL: ${AUTH_OWNER_EMAIL}
      AUTH_OWNER_PASSWORD: ${AUTH_OWNER_PASSWORD}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL_FAST: ${OPENROUTER_MODEL_FAST}
      OPENROUTER_MODEL_SMART: ${OPENROUTER_MODEL_SMART}
      PUBLIC_URL: ${PUBLIC_URL}
      NODE_ENV: production

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
      platforms:
        - linux/amd64
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_OWNER_ID: ${TELEGRAM_OWNER_ID}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL_FAST: ${OPENROUTER_MODEL_FAST}
      YC_API_KEY: ${YC_API_KEY}
      YC_FOLDER_ID: ${YC_FOLDER_ID}
      NODE_ENV: production

  scheduler:
    build:
      context: .
      dockerfile: apps/scheduler/Dockerfile
      platforms:
        - linux/amd64
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_OWNER_ID: ${TELEGRAM_OWNER_ID}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      PUBLIC_URL: ${PUBLIC_URL}
      NODE_ENV: production

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
